kind = "web"
previewPath = "/"
title = "AEVORITH — AI Creative Platform"
version = "1.0.0"
id = "artifacts/aevorith"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24845

[services.development]
run = "pnpm --filter @workspace/aevorith run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aevorith", "run", "build" ]
publicDir = "artifacts/aevorith/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24845"
BASE_PATH = "/"
